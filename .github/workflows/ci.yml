name: CI

on:
  push:
    branches: main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint & test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Required for api service when running deploy/docker-compose.test.yml (web-test profile).
      JWT_SECRET: fintrack-ci-jwt-secret-not-for-production-use
    steps:
      - uses: actions/checkout@v4

      - name: Run web tests (docker-compose.test)
        id: web_test
        run: |
          docker compose -f deploy/docker-compose.test.yml --profile web-tests build web-test
          docker compose -f deploy/docker-compose.test.yml --profile web-tests run --rm web-test

      - name: Web test summary
        if: always()
        continue-on-error: true
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        with:
          paths: "web/eslint-junit.xml"
          show: "all"

      - name: Web test summary fallback
        if: always() && steps.web_test.outcome != 'success'
        run: |
          if [ -f web/eslint-junit.xml ]; then exit 0; fi
          {
            echo "## Web (lint & test)"
            echo ""
            echo "_No \`web/eslint-junit.xml\` was produced (for example image failure or ESLint crash). See the **Run web tests (docker-compose.test)** log._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up (Compose & JUnit)
        if: always()
        run: |
          docker compose -f deploy/docker-compose.test.yml --profile web-tests down --volumes --remove-orphans || true
          rm -f web/eslint-junit.xml

  api:
    name: API (lint & test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run Go tests (docker-compose.test)
        id: go_test
        run: |
          docker compose -f deploy/docker-compose.test.yml --profile go-tests build api-go-tests
          docker compose -f deploy/docker-compose.test.yml --profile go-tests run --rm api-go-tests

      - name: Go test summary
        if: always()
        continue-on-error: true
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2
        with:
          paths: "api/junit.xml"
          show: "all"

      - name: Go test summary fallback
        if: always() && steps.go_test.outcome != 'success'
        run: |
          if [ -f api/junit.xml ]; then exit 0; fi
          {
            echo "## Go API tests"
            echo ""
            echo "_No \`api/junit.xml\` was produced (for example image or compile failure). See the **Run Go tests (docker-compose.test)** log._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up (Compose & JUnit)
        if: always()
        run: |
          docker compose -f deploy/docker-compose.test.yml --profile go-tests down --volumes --remove-orphans || true
          rm -f api/junit.xml
