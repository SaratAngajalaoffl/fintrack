name: fintrack-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack}
      POSTGRES_DB: ${POSTGRES_DB:-fintrack}
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrack}:${POSTGRES_PASSWORD:-fintrack}@postgres:5432/${POSTGRES_DB:-fintrack}
      MIGRATIONS_PATH: /migrations
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 20s

  test:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrack}:${POSTGRES_PASSWORD:-fintrack}@postgres:5432/${POSTGRES_DB:-fintrack}
      API_ORIGIN: http://api:8080
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data_test:
