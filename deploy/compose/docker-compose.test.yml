name: fintrack-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack}
      POSTGRES_DB: ${POSTGRES_DB:-fintrack}
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    volumes:
      - ../../migrations:/migrations:ro
      - ../docker/scripts/run-migrations.sh:/run-migrations.sh:ro
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-fintrack}
      PGPASSWORD: ${POSTGRES_PASSWORD:-fintrack}
      PGDATABASE: ${POSTGRES_DB:-fintrack}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/run-migrations.sh"]

  test:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrack}:${POSTGRES_PASSWORD:-fintrack}@postgres:5432/${POSTGRES_DB:-fintrack}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data_test:
