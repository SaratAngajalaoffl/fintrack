name: fintrack-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack}
      POSTGRES_DB: ${POSTGRES_DB:-fintrack}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrack}:${POSTGRES_PASSWORD:-fintrack}@postgres:5432/${POSTGRES_DB:-fintrack}
      PORT: "8000"
    volumes:
      - ../../api/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:${PORT}/health | grep -q ok",
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrack}:${POSTGRES_PASSWORD:-fintrack}@postgres:5432/${POSTGRES_DB:-fintrack}
      NODE_ENV: development
    volumes:
      - ../..:/app
      - web_node_modules:/app/web/node_modules
      - web_next:/app/web/.next
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data_dev:
  web_node_modules:
  web_next:
