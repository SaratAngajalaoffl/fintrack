name: fintrack-dev

services:
  postgres:
    image: postgres:latest
    user: "1000:1000"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack}
      POSTGRES_DB: ${POSTGRES_DB:-fintrack}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
      dockerfile: ../api/deploy/Dockerfile.dev
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ../api/.env
    environment:
      # Runtime only (not in Dockerfile): uid 1000 has no $HOME; build as root must not own /tmp/go-*.
      GOCACHE: /tmp/go-build
      GOMODCACHE: /tmp/go-mod
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintrack}:${POSTGRES_PASSWORD:-fintrack}@postgres:5432/${POSTGRES_DB:-fintrack}
      PORT: "8000"
    volumes:
      - ../api:/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8000/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 20s

  web:
    build:
      context: ../web
      dockerfile: ../web/deploy/Dockerfile.dev
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - ../web/.env
    environment:
      NODE_ENV: development
    volumes:
      - ../web:/app/web
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data_dev:
